            background-color: #202327 !important;

            cursor: pointer;

        const getTaiwanDateTime = () => {
            const now = new Date();
            const twDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
            const y = twDate.getFullYear();
            const m = String(twDate.getMonth() + 1).padStart(2, '0');
            const d = String(twDate.getDate()).padStart(2, '0');
            const hh = String(twDate.getHours()).padStart(2, '0');
            const mm = String(twDate.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d}T${hh}:${mm}`;
        };

        const toLocalISOString = (dateStr) => {
            const date = new Date(dateStr);
            const offset = date.getTimezoneOffset() * 60000;
            const localDate = new Date(date.getTime() - offset);
            return localDate.toISOString().slice(0, 16);
        };

        // ── 公開分享頁面組件 ──────────────────────────────────────────
        function SharePublicView({ token, onClose }) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const load = () => {
                    try {
                        // Decode payload directly from the token (base64url encoded JSON)
                        const decoded = decodeURIComponent(atob(token.replace(/-/g, '+').replace(/_/g, '/')));
                        const payload = JSON.parse(decoded);
                        setData(payload);
                    } catch(ex) {
                        setError('連結無效或資料損毀，請請業者重新產生連結');
                    }
                    setLoading(false);
                };
                load();
            }, [token]);

            if (loading) return (
                <div className="fixed inset-0 z-[100] bg-white dark:bg-black flex items-center justify-center">
                    <div className="text-center">
                        <div className="w-10 h-10 border-2 border-xaccent border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-gray-500 text-sm">載入中...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="fixed inset-0 z-[100] bg-white dark:bg-black flex items-center justify-center p-6">
                    <div className="text-center">
                        <div className="text-4xl mb-4">🔒</div>
                        <p className="text-lg font-bold text-black dark:text-white mb-2">{error}</p>
                        <button onClick={onClose} className="mt-4 text-sm text-xaccent underline">返回</button>
                    </div>
                </div>
            );

            const { investorName, initial_amount, history = [], currentVal, profit, roi, proxyTotal, generatedAt, ownerNote } = data || {};
            const parsedHistory = Array.isArray(history) ? history : [];
            const invested = parsedHistory.reduce((s, h) => h.type === 'add' ? s + (parseFloat(h.amount)||0) : s, parseFloat(initial_amount)||0);

            const txRows = [
                { id: 'init', ts: null, type: 'init', amount: parseFloat(initial_amount)||0 },
                ...parsedHistory
            ].sort((a, b) => (a.ts||0) - (b.ts||0));

            let running = 0;
            const txWithBalance = txRows.map(h => {
                if (h.type === 'init' || h.type === 'add') running += parseFloat(h.amount)||0;
                else if (h.type === 'settle') running += parseFloat(h.amount)||0;
                return { ...h, runningBase: running };
            });

            return (
                <div className="fixed inset-0 z-[100] bg-white dark:bg-black overflow-y-auto fade-in-overlay">
                    <div className="max-w-lg mx-auto px-4 py-8">
                        {onClose && (
                            <button onClick={onClose} className="mb-6 text-sm text-gray-400 hover:text-black dark:hover:text-white flex items-center gap-1">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
                                返回
                            </button>
                        )}

                        <div className="mb-2 flex items-center gap-2">
                            <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">代操帳戶</span>
                            <span className="text-xs bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 px-2 py-0.5 rounded-full font-bold">公開檢視</span>
                        </div>
                        <h1 className="text-3xl font-black text-black dark:text-white mb-1">{investorName || '投資帳戶'}</h1>
                        {ownerNote && <p className="text-sm text-gray-500 mb-6">{ownerNote}</p>}
                        {!ownerNote && <div className="mb-6"></div>}

                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <div className="bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-800">
                                <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">目前市值</div>
                                <div className="text-2xl font-black text-black dark:text-white">${Math.round(currentVal||0).toLocaleString()}</div>
                                <div className="text-[10px] text-gray-400 mt-1">USDT</div>
                            </div>
                            <div className="bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-800">
                                <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">損益</div>
                                <div className={`text-2xl font-black ${(profit||0) >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                    {(profit||0) >= 0 ? '+' : ''}${Math.round(profit||0).toLocaleString()}
                                </div>
                                <div className={`text-[10px] mt-1 font-bold ${(roi||0) >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                                    {(roi||0) >= 0 ? '+' : ''}{(roi||0).toFixed(2)}%
                                </div>
                            </div>
                            <div className="bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-800">
                                <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">總投入本金</div>
                                <div className="text-xl font-black text-black dark:text-white">${Math.round(invested).toLocaleString()}</div>
                                <div className="text-[10px] text-gray-400 mt-1">USDT</div>
                            </div>
                            <div className="bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-800">
                                <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">整體資金池</div>
                                <div className="text-xl font-black text-black dark:text-white">${Math.round(proxyTotal||0).toLocaleString()}</div>
                                <div className="text-[10px] text-gray-400 mt-1">代操總市值 USDT</div>
                            </div>
                        </div>

                        <div className="mb-2">
                            <div className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">資金往來明細</div>
                            <div className="space-y-2">
                                {txWithBalance.map((h, idx) => {
                                    const amt = parseFloat(h.amount) || 0;
                                    const isPositive = amt >= 0;
                                    const typeLabel = h.type === 'init' ? '初始投入' : h.type === 'add' ? '再投入' : '損益結算';
                                    const typeColor = h.type === 'init' ? 'text-blue-500 bg-blue-50 dark:bg-blue-900/30' : h.type === 'add' ? 'text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30' : (amt >= 0 ? 'text-green-600 bg-green-50 dark:bg-green-900/30' : 'text-red-500 bg-red-50 dark:bg-red-900/30');
                                    const dateStr = h.ts ? new Date(h.ts).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }) : '起始';

                                    return (
                                        <div key={h.id || idx} className="flex items-center gap-3 p-3 bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 rounded-xl">
                                            <div className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center flex-shrink-0">
                                                <span className="text-sm">{h.type === 'init' ? '🌱' : h.type === 'add' ? '➕' : '📊'}</span>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-2">
                                                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${typeColor}`}>{typeLabel}</span>
                                                    <span className="text-[10px] text-gray-400">{dateStr}</span>
                                                </div>
                                                <div className="text-[10px] text-gray-400 mt-0.5">累計計息本金: ${h.runningBase.toFixed(2)}</div>
                                            </div>
                                            <div className={`text-sm font-black flex-shrink-0 ${isPositive ? 'text-green-500' : 'text-red-500'}`}>
                                                {isPositive ? '+' : ''}${amt.toFixed(2)}
                                            </div>
                                        </div>
                                    );
                                })}
                                <div className="flex items-center gap-3 p-3 bg-black dark:bg-white rounded-xl">
                                    <div className="w-8 h-8 rounded-full bg-white/20 dark:bg-black/20 flex items-center justify-center flex-shrink-0">
                                        <span className="text-sm">💰</span>
                                    </div>
                                    <div className="flex-1">
                                        <div className="text-[10px] font-bold text-white/70 dark:text-black/70">目前帳面價值</div>
                                        <div className="text-[10px] text-white/50 dark:text-black/50 mt-0.5">含未結算損益</div>
                                    </div>
                                    <div className="text-lg font-black text-white dark:text-black">${Math.round(currentVal||0).toLocaleString()}</div>
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 text-center">
                            <div className="text-[10px] text-gray-300 dark:text-gray-700">
                                產生時間: {generatedAt ? new Date(generatedAt).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }) : '-'}
                            </div>
                            <div className="text-[10px] text-gray-300 dark:text-gray-700 mt-1">Crypto Invest · 代操管理系統</div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);
            const [records, setRecords] = useState([]);
            const [initCap, setInitCap] = useState(0);
            
            const [showProfit, setShowProfit] = useState(() => {
                const saved = localStorage.getItem('investflow_show_profit');
                return saved === null ? true : saved === 'true';
            });

            useEffect(() => {
                localStorage.setItem('investflow_show_profit', showProfit);
            }, [showProfit]);

            const [isChartZoomed, setIsChartZoomed] = useState(() => {
                const saved = localStorage.getItem('investflow_chart_zoom');
                return saved === null ? true : saved === 'true'; 
            });

            useEffect(() => {
                localStorage.setItem('investflow_chart_zoom', isChartZoomed);
            }, [isChartZoomed]);

            const [currency, setCurrency] = useState('USD');
            const [usdtToTwdRate, setUsdtToTwdRate] = useState(32.0); 
            const rateMultiplier = currency === 'TWD' ? usdtToTwdRate : 1;
            const curSymbol = currency === 'TWD' ? 'NT$' : '$';

            const fetchMaxRate = async () => {
                try {
                    const targetUrl = 'https://max-api.maicoin.com/api/v2/tickers/usdttwd';
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                    const res = await fetch(proxyUrl);
                    const data = await res.json();
                    if(data && data.last) {
                        setUsdtToTwdRate(parseFloat(data.last));
                    }
                } catch(e) {
                    console.error("Failed to fetch TWD rate from MAX", e);
                }
            };

            useEffect(() => {
                fetchMaxRate();
                const rateInterval = setInterval(fetchMaxRate, 10000); 
                return () => clearInterval(rateInterval);
            }, []);

            const [filterRange, setFilterRange] = useState(() => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const lastDay = new Date(year, now.getMonth() + 1, 0).getDate();
                return { 
                    start: `${year}-${month}-01`, 
                    end: `${year}-${month}-${lastDay}` 
                };
            });

            const [activeTag, setActiveTag] = useState(null);
            const [calendarDate, setCalendarDate] = useState(new Date());

            const [arbForm, setArbForm] = useState({
                sellPrice: '',
                sellQty: '',
                fee: '0.1', 
                buyPrice: ''
            });

            const [arbRecords, setArbRecords] = useState([]);
            const [managedFunds, setManagedFunds] = useState([]);
            const [proxyTotal, setProxyTotal] = useState('');
            
            const [syncWithdrawal, setSyncWithdrawal] = useState('');

            const [showHistoryId, setShowHistoryId] = useState(null);
            const [addFundId, setAddFundId] = useState(null);
            const [addFundAmount, setAddFundAmount] = useState('');

            // ── 新增: 資產分配頁面狀態 ────────────────────────────
            const [selectedInvestorId, setSelectedInvestorId] = useState(null);
            const [timelineCollapsed, setTimelineCollapsed] = useState(false);
            const [shareModalOpen, setShareModalOpen] = useState(false);
            const [shareUrl, setShareUrl] = useState('');
            const [shareLoading, setShareLoading] = useState(false);
            const [shareCopied, setShareCopied] = useState(false);
            const [publicViewToken, setPublicViewToken] = useState(null);
            const [distViewMode, setDistViewMode] = useState('overview'); // 'overview' | 'detail'
            
            const arbDebounceRef = useRef(null);
            const proxyDebounceRef = useRef(null);
            const fundDebounceRef = useRef(null);

            const [isDarkMode, setIsDarkMode] = useState(() => {
                const savedTheme = localStorage.getItem('investflow_theme');
                if (savedTheme) return savedTheme === 'dark';
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            });

            useEffect(() => {
                const html = document.documentElement;
                if (isDarkMode) { html.classList.add('dark'); localStorage.setItem('investflow_theme', 'dark'); } 
                else { html.classList.remove('dark'); localStorage.setItem('investflow_theme', 'light'); }
            }, [isDarkMode]);
            
            const [assets, setAssets] = useState([]);
            const debounceTimeoutRef = useRef(null);

            const fetchAssets = async (userId) => {
                const { data: dbAssets, error } = await supabase.from('assets').select('*').order('created_at', { ascending: true });
                if (error) { console.error('Error fetching assets:', error); return; }
                const localAssets = localStorage.getItem('investflow_assets');
                if (dbAssets.length === 0 && localAssets) {
                    const parsed = JSON.parse(localAssets);
                    const migratedAssets = parsed.map(a => ({
                        id: a.id, user_id: userId, coin: a.coin || 'USDT', name: a.name || '', quantity: a.quantity !== undefined ? a.quantity : (parseFloat(a.amount) || 0)
                    }));
                    const { error: insertError } = await supabase.from('assets').insert(migratedAssets);
                    if (!insertError) { setAssets(migratedAssets); localStorage.removeItem('investflow_assets'); }
                } else { setAssets(dbAssets); }
            };

            const fetchUserPreferences = async (userId) => {
                const { data, error } = await supabase.from('user_preferences').select('*').eq('user_id', userId).single();
                if (data) {
                    setArbForm({
                        sellPrice: data.arb_sell_price || '',
                        sellQty: data.arb_sell_qty || '',
                        fee: data.arb_fee || '0.1',
                        buyPrice: data.arb_buy_price || ''
                    });
                    setProxyTotal(data.proxy_current_total || ''); 
                }
            };

            const fetchManagedFunds = async (userId) => {
                const { data, error } = await supabase.from('managed_funds').select('*').order('created_at', { ascending: true });
                if (!error) {
                    setManagedFunds(data);
                }
            };

            const fetchArbRecords = async (userId) => {
                const { data, error } = await supabase.from('arb_records').select('*').order('date', { ascending: false });
                if (!error && data) {
                    setArbRecords(data);
                }
            };

            const updateArbForm = (field, value) => {
                const newForm = { ...arbForm, [field]: value };
                setArbForm(newForm);
                if (arbDebounceRef.current) clearTimeout(arbDebounceRef.current);
                arbDebounceRef.current = setTimeout(async () => {
                    if (user) {
                        await supabase.from('user_preferences').upsert({
                            user_id: user.id,
                            arb_sell_price: parseFloat(newForm.sellPrice) || null,
                            arb_sell_qty: parseFloat(newForm.sellQty) || null,
                            arb_fee: parseFloat(newForm.fee) || null,
                            arb_buy_price: parseFloat(newForm.buyPrice) || null,
                            proxy_current_total: parseFloat(proxyTotal) || null, 
                            updated_at: new Date().toISOString()
                        });
                    }
                }, 1000);
            };

            const saveArbRecord = async (summaryData) => {
                if (!user || !summaryData) return;
                const newRecord = {
                    id: Date.now(),
                    user_id: user.id,
                    date: new Date().toISOString(),
                    sell_qty: parseFloat(arbForm.sellQty),
                    profit_usdt: summaryData.profitUSDT,
                    roi: summaryData.roi
                };
                
                setArbRecords([newRecord, ...arbRecords]);
                await supabase.from('arb_records').insert([newRecord]);
                alert('已儲存試算紀錄！');
            };

            const deleteArbRecord = async (id) => {
                if (!confirm('確定要刪除此套利紀錄嗎？')) return;
                setArbRecords(arbRecords.filter(r => r.id !== id));
                await supabase.from('arb_records').delete().eq('id', id);
            };

            const updateProxyTotal = (val) => {
                setProxyTotal(val);
                if (proxyDebounceRef.current) clearTimeout(proxyDebounceRef.current);
                proxyDebounceRef.current = setTimeout(async () => {
                    if (user) {
                        await supabase.from('user_preferences').upsert({
                            user_id: user.id,
                            arb_sell_price: parseFloat(arbForm.sellPrice) || null,
                            arb_sell_qty: parseFloat(arbForm.sellQty) || null,
                            arb_fee: parseFloat(arbForm.fee) || null,
                            arb_buy_price: parseFloat(arbForm.buyPrice) || null,
                            proxy_current_total: parseFloat(val) || null,
                            updated_at: new Date().toISOString()
                        });
                    }
                }, 1000);
            };

            const updateManagedFund = (id, field, value) => {
                const newList = managedFunds.map(m => m.id === id ? { ...m, [field]: value } : m);
                setManagedFunds(newList);
                if (fundDebounceRef.current) clearTimeout(fundDebounceRef.current);
                fundDebounceRef.current = setTimeout(async () => {
                    const item = newList.find(m => m.id === id);

                const monthProfits = [];
                for (let i = 1; i <= daysInMonth; i++) {
                    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    if (dailyProfits[key] !== undefined) monthProfits.push(dailyProfits[key]);
                }
                const maxProfit = Math.max(...monthProfits.filter(p => p > 0), 1);
                const maxLoss = Math.abs(Math.min(...monthProfits.filter(p => p < 0), -1));

                const getHeatBg = (profit) => {
                    if (profit === undefined) return '';
                    if (profit > 0) {
                        const intensity = Math.min(profit / maxProfit, 1);
                        if (intensity > 0.75) return isDarkMode ? 'bg-green-800' : 'bg-green-400';
                        if (intensity > 0.4)  return isDarkMode ? 'bg-green-900' : 'bg-green-200';
                        return isDarkMode ? 'bg-green-950' : 'bg-green-100';
                    } else {
                        const intensity = Math.min(Math.abs(profit) / maxLoss, 1);
                        if (intensity > 0.75) return isDarkMode ? 'bg-red-800' : 'bg-red-300';
                        if (intensity > 0.4)  return isDarkMode ? 'bg-red-900' : 'bg-red-100';
                        return isDarkMode ? 'bg-red-950' : 'bg-red-50';
                    }
                };

                const days = [];
                for (let i = 0; i < firstDay; i++) { days.push(<div key={`empty-${i}`} className="h-16 bg-gray-50/50 dark:bg-gray-900/30 border border-gray-100 dark:border-gray-800 rounded-md"></div>); }
                for (let i = 1; i <= daysInMonth; i++) {
                    const dayStr = String(i).padStart(2, '0');
                    const monthStr = String(month + 1).padStart(2, '0');
                    const dateKey = `${year}-${monthStr}-${dayStr}`;
                    const profit = dailyProfits[dateKey];
                    const displayProfit = profit !== undefined ? profit * rateMultiplier : undefined;
                    const heatBg = getHeatBg(profit);

                    days.push(
                        <div key={dateKey} className={`h-16 border border-gray-100 dark:border-gray-800 rounded-md p-1 flex flex-col justify-between transition-all cursor-pointer hover:opacity-80 ${heatBg || 'bg-white dark:bg-gray-950'}`} onClick={() => displayProfit !== undefined && alert(`${dateKey}\n當日獲利: ${curSymbol}${Math.round(displayProfit).toLocaleString()}`)}>

                    const day = now.getDay();
                    const s = new Date(now); s.setDate(now.getDate() - day);
                    const e = new Date(now); e.setDate(now.getDate() + (6 - day));
                    start = s.toISOString().slice(0,10);
                    end = e.toISOString().slice(0,10);

                    const lastDay = new Date(y, m+1, 0).getDate();

                const buyP = parseFloat(arbForm.buyPrice) || 0;

                if (sellP <= 0 || sellQ <= 0) return null;

                const breakEvenP = sellP * Math.pow(1 - (feeRate / 100), 2);
                const grossTWD = sellP * sellQ;
                const feeSell = grossTWD * (feeRate / 100);
                const netTWD = grossTWD - feeSell;

                let step2 = null;
                let summary = null;

                if (buyP > 0) {
                    const grossBuyUSDT = netTWD / buyP;
                    const feeBuyUSDT = grossBuyUSDT * (feeRate / 100);
                    const netBuyUSDT = grossBuyUSDT - feeBuyUSDT;
                    const profitUSDT = netBuyUSDT - sellQ;
                    const roi = (profitUSDT / sellQ) * 100;
                    step2 = { grossBuyUSDT, feeBuyUSDT, netBuyUSDT };

                    const init = parseFloat(m.initial_amount) || 0;
                    const history = Array.isArray(m.history) ? m.history : (typeof m.history === 'string' ? JSON.parse(m.history || '[]') : []);

                    let base = init;
                    let invested = init;

                    history.forEach(h => {
                        base += parseFloat(h.amount) || 0;
                        if (h.type === 'add') {
                            invested += parseFloat(h.amount) || 0;

                    });

                    totalBase += base;
                    totalInvested += invested;

                    return { ...m, parsedHistory: history, base, invested };
                });

                const totalProfit = totalCurrent - totalInvested;
                const totalROI = totalInvested > 0 ? (totalProfit / totalInvested) * 100 : 0;

                const list = listWithBase.map(m => {
                    const ratio = totalBase > 0 ? m.base / totalBase : 0;
                    const currentVal = ratio * totalCurrent;
                    const p = currentVal - m.invested;
                    const r = m.invested > 0 ? (p / m.invested) * 100 : 0;

            const handleGenerateShare = (investorId) => {

                const mStat = distributionStats.list.find(m => m.id === investorId);

                const payload = {
                    investorName: mStat.name || '投資人',
                    initial_amount: mStat.initial_amount,
                    history: mStat.parsedHistory,
                    currentVal: mStat.currentVal,
                    profit: mStat.p,
                    roi: mStat.r,
                    proxyTotal: parseFloat(proxyTotal) || 0,
                    generatedAt: new Date().toISOString(),
                };

                try {
                    // Encode payload directly into URL (no backend table needed)
                    const jsonStr = JSON.stringify(payload);

                    const encoded = btoa(encodeURIComponent(jsonStr))
                        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
                    const url = `${window.location.origin}${window.location.pathname}?share=${encoded}`;

            const handleSettleProfits = async () => {
                if (distributionStats.totalBase <= 0) return alert('目前沒有任何本金權重可供分配！');
                if (!confirm("確定要將目前的「帳面損益」按比例分配，並計入各帳戶的權重中嗎？\n\n這將鎖定各帳戶的真實淨值，未來的獲利將依此新權重計算。")) return;

                const newFunds = [...managedFunds];
                let allSuccess = true;

                for (let i = 0; i < distributionStats.list.length; i++) {
                    const mStat = distributionStats.list[i];
                    if (Math.abs(mStat.currentVal - mStat.base) > 0.01) { 
                        const fundIndex = newFunds.findIndex(f => f.id === mStat.id);
                        if (fundIndex >= 0) {
                            const profitToSettle = mStat.currentVal - mStat.base;
                            const hRecord = { id: Date.now() + i, ts: Date.now(), type: 'settle', amount: profitToSettle };
                            const curHist = Array.isArray(newFunds[fundIndex].history) ? newFunds[fundIndex].history :
                                            (typeof newFunds[fundIndex].history === 'string' ? JSON.parse(newFunds[fundIndex].history || '[]') : []);

                            newFunds[fundIndex].history = [...curHist, hRecord];

                            const { error } = await supabase.from('managed_funds').upsert({
                                id: mStat.id,
                                user_id: user.id,
                                name: mStat.name,
                                initial_amount: mStat.initial_amount,
                                history: newFunds[fundIndex].history
                            });
                            if (error) allSuccess = false;
                        }
                    }
                }

                if (allSuccess) {
                    setManagedFunds(newFunds);
                    alert("✅ 獲利結算成功！帳面價值已正式轉為新權重基準。");
                } else {
                    alert("⚠️ 部分結算失敗，請檢查網路連線。");
                    fetchManagedFunds(user.id); 
                }
            };

            const submitAddFund = async (fundId) => {
                const amt = parseFloat(addFundAmount);
                if (!amt || amt <= 0) return alert('請輸入有效金額');

                const fundIndex = managedFunds.findIndex(f => f.id === fundId);
                if (fundIndex < 0) return;

                const newFunds = [...managedFunds];
                const hRecord = { id: Date.now(), ts: Date.now(), type: 'add', amount: amt };
                const curHist = Array.isArray(newFunds[fundIndex].history) ? newFunds[fundIndex].history :

                newFunds[fundIndex].history = [...curHist, hRecord];

                const newTotal = (parseFloat(proxyTotal) || 0) + amt;

                await supabase.from('managed_funds').upsert({

                    name: newFunds[fundIndex].name,

                setManagedFunds(newFunds);

                setAddFundId(null);

                alert(`✅ 成功再投入 ${amt} USD！總資產池已自動更新。`);

                                    <div className="flex flex-col items-center justify-center py-20 px-6">
                                        <div className="w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-900 flex items-center justify-center mb-4">
                                            <svg className="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        </div>
                                        <p className="text-gray-400 text-sm mb-4">尚未新增任何投資人</p>
                                        <button onClick={addInvestor} className="bg-black dark:bg-white text-white dark:text-black font-bold px-6 py-3 rounded-full text-sm hover:opacity-90 transition-opacity">
                                            + 新增第一位投資人
                                        </button>
                                    </div>
                                )}

                                {/* 圓餅圖概覽 (收起在底部) */}
                                {distributionStats.list.length > 1 && (
                                    <div className="mt-4 mx-4 mb-4 border border-gray-100 dark:border-gray-800 rounded-2xl overflow-hidden">
                                        <div className="px-4 py-3 bg-gray-50 dark:bg-gray-950 flex items-center justify-between">
                                            <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">投資人佔比圖</span>
                                        </div>
                                        <div className="h-52 bg-white dark:bg-black">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie
                                                        data={distributionStats.list}
                                                        dataKey="base"
                                                        nameKey="name"
                                                        cx="50%"
                                                        cy="50%"
                                                        innerRadius={40}
                                                        outerRadius={65}
                                                        paddingAngle={4}
                                                        label={renderCustomizedLabel}
                                                        labelLine={{ stroke: isDarkMode ? '#71767b' : '#333' }}
                                                    >
                                                        {distributionStats.list.map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={PIE_COLORS[index % PIE_COLORS.length]} />
                                                        ))}
                                                    </Pie>
                                                    <Legend verticalAlign="bottom" height={36}/>
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                )}
                            </div>
                            );
                        })()}

                        {activeTab === 'arbitrage' && (
                            <div className="animate-in fade-in duration-300">
                                <div className="p-6">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-2xl font-black text-black dark:text-xwhite">USDT 循環套利試算</h2>
                                        <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full px-4 py-2 flex items-center gap-2">
                                            <span className="text-xs font-bold text-gray-500">交易手續費率</span>
                                            <input type="number" value={arbForm.fee} onChange={e=>updateArbForm('fee', e.target.value)} className="bg-transparent w-24 text-center font-bold text-black dark:text-xwhite outline-none border-b border-gray-300 focus:border-xaccent transition-colors" />
                                            <span className="text-xs font-bold text-gray-500">%</span>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="bg-white dark:bg-gray-900 rounded-2xl p-6 border border-gray-200 dark:border-gray-800 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1.5 h-full bg-red-500"></div>
                                            <div className="flex items-center gap-2 mb-4">
                                                <div className="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center text-white text-xs font-bold">1</div>
                                                <span className="font-bold text-lg text-black dark:text-xwhite">高點賣出 (USDT -&gt; TWD)</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                                <div>
                                                    <label className="text-[10px] font-bold text-gray-400 block mb-1">賣出匯率</label>
                                                    <input type="number" placeholder="32.5" value={arbForm.sellPrice} onChange={e=>updateArbForm('sellPrice', e.target.value)} className="x-input w-full p-3 text-xl font-black bg-gray-50 dark:bg-black text-black dark:text-xwhite" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-gray-400 block mb-1">賣出數量 (USDT)</label>
                                                    <input type="number" placeholder="1000" value={arbForm.sellQty} onChange={e=>updateArbForm('sellQty', e.target.value)} className="x-input w-full p-3 text-xl font-black bg-gray-50 dark:bg-black text-black dark:text-xwhite" />
                                                </div>
                                            </div>
                                            
                                            {arbStats && arbStats.breakEvenP && (
                                                <div className="mb-4 bg-orange-50 dark:bg-orange-900/30 rounded-lg p-3 border border-orange-200 dark:border-orange-800 flex items-start gap-2">
                                                    <svg className="w-5 h-5 text-orange-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                    <div>
                                                        <p className="text-xs font-bold text-orange-600 dark:text-orange-400 mb-1">建議買回上限 (損益平衡)</p>
                                                        <p className="text-sm text-gray-600 dark:text-gray-300">
                                                            必須低於 <strong className="text-black dark:text-white">{arbStats.breakEvenP.toFixed(4)}</strong> 買回才會有獲利
                                                        </p>
                                                    </div>
                                                </div>
                                            )}
                                            
                                            {arbStats && (
                                                <div className="bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3 text-sm space-y-1">
                                                    <div className="flex justify-between text-gray-500">
                                                        <span>交易總額</span>
                                                        <span>${Math.round(arbStats.step1.grossTWD).toLocaleString()}</span>
                                                    </div>
                                                    <div className="flex justify-between text-red-400">
                                                        <span>手續費支出 ({arbForm.fee}%)</span>
                                                        <span>-${Math.round(arbStats.step1.feeSell).toLocaleString()}</span>
                                                    </div>
                                                    <div className="flex justify-between font-bold text-black dark:text-xwhite pt-2 border-t border-gray-200 dark:border-gray-700">
                                                        <span>實際入袋 (Net TWD)</span>
                                                        <span className="text-green-500">${Math.round(arbStats.step1.netTWD).toLocaleString()}</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex justify-center -my-3 relative z-10 text-gray-300">
                                            <svg className="w-8 h-8 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                                        </div>

                                        <div className="bg-white dark:bg-gray-900 rounded-2xl p-6 border border-gray-200 dark:border-gray-800 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1.5 h-full bg-green-500"></div>
                                            <div className="flex items-center gap-2 mb-4">
                                                <div className="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white text-xs font-bold">2</div>
                                                <span className="font-bold text-lg text-black dark:text-xwhite">低點買回 (TWD -&gt; USDT)</span>
                                            </div>
                                            <div className="mb-4">
                                                <label className="text-[10px] font-bold text-gray-400 block mb-1">買回匯率</label>
                                                <input type="number" placeholder="32.1" value={arbForm.buyPrice} onChange={e=>updateArbForm('buyPrice', e.target.value)} className="x-input w-full p-3 text-xl font-black bg-gray-50 dark:bg-black text-black dark:text-xwhite" />
                                            </div>

                                            {arbStats && arbStats.step2 && (
                                                <div className="bg-gray-50 dark:bg-gray-800/50 rounded-lg p-3 text-sm space-y-1">
                                                    <div className="flex justify-between text-gray-500">
                                                        <span>可用本金 (來自 Step 1)</span>
                                                        <span>${Math.round(arbStats.step1.netTWD).toLocaleString()}</span>
                                                    </div>
                                                    <div className="flex justify-between text-gray-500">
                                                        <span>預估買入 (Gross)</span>
                                                        <span>{arbStats.step2.grossBuyUSDT.toFixed(2)} U</span>
                                                    </div>
                                                    <div className="flex justify-between text-red-400">
                                                        <span>手續費支出 ({arbForm.fee}%)</span>
                                                        <span>-{arbStats.step2.feeBuyUSDT.toFixed(2)} U</span>
                                                    </div>
                                                    <div className="flex justify-between font-bold text-black dark:text-xwhite pt-2 border-t border-gray-200 dark:border-gray-700">
                                                        <span>實際買回 (Net USDT)</span>
                                                        <span className="text-green-500">{arbStats.step2.netBuyUSDT.toFixed(2)} U</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {arbStats && arbStats.summary ? (
                                            <div className="space-y-4">
                                                <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 text-white shadow-lg">
                                                    <h3 className="text-center text-sm font-bold opacity-80 mb-4 uppercase tracking-widest">套利結果總結</h3>
                                                    <div className="flex justify-between items-center mb-6 px-4">
                                                        <div className="text-center">
                                                            <div className="text-xs opacity-60 mb-1">初始持有</div>
                                                            <div className="text-xl font-bold">{parseFloat(arbForm.sellQty).toLocaleString()} U</div>
                                                        </div>
                                                        <div className="text-2xl opacity-50">➔</div>
                                                        <div className="text-center">
                                                            <div className="text-xs opacity-60 mb-1">最終持有</div>
                                                            <div className="text-xl font-bold">{arbStats.step2.netBuyUSDT.toFixed(2)} U</div>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="bg-white/10 rounded-xl p-4 flex items-center justify-between">
                                                        <div>
                                                            <div className="text-xs opacity-70 mb-1">淨賺價差 (Profit)</div>
                                                            <div className="text-3xl font-black">+{arbStats.summary.profitUSDT.toFixed(2)} U</div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-xs opacity-70 mb-1">報酬率 (ROI)</div>
                                                            <div className="text-2xl font-bold">+{arbStats.summary.roi.toFixed(2)}%</div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button onClick={() => saveArbRecord(arbStats.summary)} className="w-full py-4 bg-black dark:bg-xwhite text-white dark:text-black font-bold rounded-xl shadow-md hover:opacity-90 active:scale-95 transition-all text-lg">
                                                    儲存此試算結果
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="text-center text-gray-400 py-10 text-sm">
                                                請完整輸入 賣出價 / 數量 / 買回價 以查看分析結果
                                            </div>
                                        )}

                                        {arbRecords.length > 0 && (
                                            <div className="mt-8 pt-6 border-t border-gray-100 dark:border-gray-800">
                                                <div className="text-xs font-bold text-gray-500 dark:text-xlight uppercase tracking-wider mb-4">歷史套利紀錄</div>
                                                <div className="space-y-3">
                                                    {arbRecords.map(r => (
                                                        <div key={r.id} className="p-4 bg-white dark:bg-black border border-gray-200 dark:border-gray-800 rounded-xl flex items-center justify-between group">
                                                            <div>
                                                                <div className="text-[10px] text-gray-400 mb-1">{new Date(r.date).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false })}</div>
                                                                <div className="text-sm text-black dark:text-xwhite font-bold">投入: {r.sell_qty} U</div>
                                                            </div>
                                                            <div className="flex items-center gap-4">
                                                                <div className="text-right">
                                                                    <div className="text-sm font-black text-green-500">+{parseFloat(r.profit_usdt).toFixed(2)} U</div>
                                                                    <div className="text-xs font-bold text-green-600 dark:text-green-400">ROI: {parseFloat(r.roi).toFixed(2)}%</div>
                                                                </div>
                                                                <button onClick={() => deleteArbRecord(r.id)} className="text-gray-300 hover:text-red-500 transition-colors p-1">
                                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
