        :root {
            --bg: #f2f2f7;
            --bg2: #ffffff;
            --bg3: #f2f2f7;
            --card: #ffffff;
            --card2: #f2f2f7;
            --text: #000000;
            --text2: #3c3c43;
            --text3: #8e8e93;
            --sep: rgba(60,60,67,0.12);
            --accent: #007aff;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --purple: #af52de;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --tab-height: 82px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #000000;
                --bg2: #1c1c1e;
                --bg3: #000000;
                --card: #1c1c1e;
                --card2: #2c2c2e;
                --text: #ffffff;
                --text2: rgba(255,255,255,0.6);
                --text3: rgba(255,255,255,0.3);
                --sep: rgba(255,255,255,0.1);
                --accent: #0a84ff;
                --green: #30d158;
                --red: #ff453a;
                --orange: #ff9f0a;
                --purple: #bf5af2;
            }
        }
        :root[data-theme="dark"] {
            --bg: #000000;
            --bg2: #1c1c1e;
            --bg3: #000000;
            --card: #1c1c1e;
            --card2: #2c2c2e;
            --text: #ffffff;
            --text2: rgba(255,255,255,0.6);
            --text3: rgba(255,255,255,0.3);
            --sep: rgba(255,255,255,0.1);
            --accent: #0a84ff;
            --green: #30d158;
            --red: #ff453a;
            --orange: #ff9f0a;
            --purple: #bf5af2;
        }
        :root[data-theme="light"] {
            --bg: #f2f2f7;
            --bg2: #ffffff;
            --bg3: #f2f2f7;
            --card: #ffffff;
            --card2: #f2f2f7;
            --text: #000000;
            --text2: #3c3c43;
            --text3: #8e8e93;
            --sep: rgba(60,60,67,0.12);
            --accent: #007aff;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --purple: #af52de;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif; overflow: hidden; }
        #root { height: 100%; display: flex; flex-direction: column; }
        input, select, textarea, button { font-family: inherit; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        ::-webkit-scrollbar { display: none; }

        /* ── iOS Nav ── */
        .ios-nav {
            background: var(--bg2);
            border-bottom: 0.5px solid var(--sep);
            padding: 12px 16px 10px;
            position: sticky; top: 0; z-index: 20;
        }
        .ios-nav-large { font-size: 30px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
        .ios-nav-subtitle { font-size: 13px; color: var(--text3); margin-top: 1px; }
        .ios-nav-row { display: flex; align-items: center; justify-content: space-between; }
        .ios-nav-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--card2); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ios-nav-btn svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; }

        /* ── Tab Bar ── */
        .tab-bar {
            background: var(--bg2);
            border-top: 0.5px solid var(--sep);
            height: var(--tab-height);
            display: flex;
            padding-bottom: var(--safe-bottom);
            flex-shrink: 0;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; padding-top: 8px; border: none; background: none; }
        .tab-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
        .tab-icon svg { width: 24px; height: 24px; fill: none; stroke-width: 1.8; transition: all 0.2s; }
        .tab-label { font-size: 10px; font-weight: 500; transition: color 0.2s; }
        .tab-item.active .tab-icon svg { stroke: var(--accent); }
        .tab-item.active .tab-label { color: var(--accent); }
        .tab-item:not(.active) .tab-icon svg { stroke: var(--text3); }
        .tab-item:not(.active) .tab-label { color: var(--text3); }

        /* ── Scroll Page ── */
        .page { flex: 1; overflow-y: auto; background: var(--bg); }
        .page-content { padding: 0 16px 24px; }

        /* ── Cards ── */
        .card { background: var(--card); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
        .card-inner { padding: 16px; }
        .card-row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 0.5px solid var(--sep); }
        .card-row:last-child { border-bottom: none; }
        .card-section-title { font-size: 20px; font-weight: 700; color: var(--text); padding: 20px 0 8px; letter-spacing: -0.3px; }

        /* ── Hero Card ── */
        .hero-card { background: var(--card); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 12px; }
        .hero-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
        .hero-amount { font-size: 42px; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1.1; margin: 4px 0 6px; }
        .hero-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(52,199,89,0.12); color: var(--green); font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
        .hero-badge.neg { background: rgba(255,59,48,0.12); color: var(--red); }

        /* ── Grid ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat-card { background: var(--card); border-radius: var(--radius-lg); padding: 14px; }
        .stat-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-value.blue { color: var(--accent); }

        /* ── List rows ── */
        .list-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .list-icon svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }
        .list-body { flex: 1; min-width: 0; margin: 0 10px; }
        .list-title { font-size: 15px; font-weight: 500; color: var(--text); }
        .list-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
        .list-right { text-align: right; flex-shrink: 0; }
        .list-value { font-size: 15px; font-weight: 600; color: var(--text); }
        .list-value.green { color: var(--green); }
        .list-value.red { color: var(--red); }
        .chevron { width: 7px; height: 12px; margin-left: 6px; flex-shrink: 0; opacity: 0.3; }

        /* ── Inputs ── */
        .ios-input { background: var(--card2); border: none; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 16px; color: var(--text); width: 100%; outline: none; }
        .ios-input::placeholder { color: var(--text3); }
        .ios-input:focus { background: var(--card2); }
        .input-group { margin-bottom: 12px; }
        .input-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }

        /* ── Buttons ── */
        .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
        .btn-primary:active { opacity: 0.8; }
        .btn-secondary { background: var(--card2); color: var(--text); border: none; border-radius: var(--radius-md); padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-danger { background: rgba(255,59,48,0.1); color: var(--red); border: none; border-radius: var(--radius-md); padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-green { background: rgba(52,199,89,0.1); color: var(--green); border: none; border-radius: var(--radius-md); padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }

        /* ── Segment ── */
        .segment { background: var(--card2); border-radius: var(--radius-sm); padding: 2px; display: inline-flex; }
        .segment-btn { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; color: var(--text3); background: transparent; }
        .segment-btn.active { background: var(--card); color: var(--text); }

        /* ── Tag ── */
        .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .tag-blue { background: rgba(0,122,255,0.12); color: var(--accent); }
        .tag-green { background: rgba(52,199,89,0.12); color: var(--green); }
        .tag-red { background: rgba(255,59,48,0.12); color: var(--red); }
        .tag-purple { background: rgba(175,82,222,0.12); color: var(--purple); }
        .tag-orange { background: rgba(255,149,0,0.12); color: var(--orange); }

        /* ── Mini bar chart ── */
        .mini-bars { display: flex; align-items: flex-end; gap: 3px; height: 56px; }
        .mini-bar { flex: 1; border-radius: 3px 3px 0 0; transition: height 0.3s; }

        /* ── Separator ── */
        .sep { height: 0.5px; background: var(--sep); margin: 0 16px; }

        /* ── Coin badge ── */
        .coin-badge { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }

        /* ── Modal / Sheet ── */
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 80; display: flex; align-items: flex-end; }
        .sheet { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; padding: 8px 16px 32px; max-height: 85vh; overflow-y: auto; }
        .sheet-handle { width: 36px; height: 4px; background: var(--sep); border-radius: 2px; margin: 8px auto 16px; }
        .sheet-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 16px; color: var(--text); }

        /* ── Progress bar ── */
        .progress-track { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

        /* ── Auth page ── */
        .auth-page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; background: var(--bg); }
        .auth-logo { font-size: 48px; font-weight: 800; color: var(--text); letter-spacing: -2px; margin-bottom: 8px; }
        .auth-sub { font-size: 15px; color: var(--text3); margin-bottom: 48px; }

        /* ── Animations ── */
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeSlideUp 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.2s ease; }

        /* ── Edit mode ── */
        .edit-overlay { background: var(--card); border-radius: var(--radius-lg); padding: 14px; margin: 4px 0; }

        /* ── Public share page ── */
        .share-page { flex: 1; overflow-y: auto; background: var(--bg); padding: 24px 16px; }

        /* ── Pie chart legend ── */
        .pie-legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 14px; }
        .pie-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
        .pie-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* ── Investor tab scroll ── */
        .inv-tabs { display: flex; overflow-x: auto; padding: 0 16px; gap: 8px; border-bottom: 0.5px solid var(--sep); scrollbar-width: none; }
        .inv-tab { flex-shrink: 0; padding: 10px 16px; border-bottom: 2px solid transparent; font-size: 14px; font-weight: 600; color: var(--text3); cursor: pointer; white-space: nowrap; border-top: none; border-left: none; border-right: none; background: none; }
        .inv-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── Timeline ── */
        .timeline { position: relative; padding-left: 36px; }
        .timeline-line { position: absolute; left: 18px; top: 8px; bottom: 8px; width: 1.5px; background: var(--sep); }
        .timeline-item { position: relative; margin-bottom: 12px; }
        .timeline-dot { position: absolute; left: -27px; top: 12px; width: 10px; height: 10px; border-radius: 50%; }

        /* ── Arb gradient ── */
        .arb-result { background: linear-gradient(135deg, #007aff 0%, #5856d6 100%); border-radius: var(--radius-xl); padding: 24px; color: #fff; margin-bottom: 12px; }
        @media (prefers-color-scheme: dark) {
            .arb-result { background: linear-gradient(135deg, #0a84ff 0%, #6e6ce8 100%); }
        }

        /* ── Calendar ── */
        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
        .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .cal-day-num { font-size: 13px; font-weight: 500; color: var(--text); }
        .cal-profit { font-size: 8px; font-weight: 700; position: absolute; bottom: 3px; }

        /* ── Drawer ── */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 60; }
        .drawer { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--bg2); z-index: 70; padding: 60px 20px 40px; display: flex; flex-direction: column; overflow-y: auto; }
        .drawer-nav-item { display: flex; align-items: center; gap: 14px; padding: 13px 12px; border-radius: var(--radius-md); cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; }
        .drawer-nav-item.active { background: rgba(0,122,255,0.1); }
        .drawer-nav-item svg { width: 20px; height: 20px; fill: none; stroke-width: 1.8; }
        .drawer-nav-item.active svg { stroke: var(--accent); }
        .drawer-nav-item:not(.active) svg { stroke: var(--text3); }
        .drawer-nav-label { font-size: 16px; font-weight: 500; }
        .drawer-nav-item.active .drawer-nav-label { color: var(--accent); font-weight: 600; }
        .drawer-nav-item:not(.active) .drawer-nav-label { color: var(--text); }
    </style>
</head>

        up: <><path d="M5 15l7-7 7 7"/></>,
        download: <><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></>,
    };
    return <svg style={s} viewBox="0 0 24 24">{paths[name]}</svg>;
};

// ── Public Share View ───────────────────────────
function SharePublicView({token, onClose}) {
    const [data, setData] = useState(null);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);
    useEffect(() => {
        try {
            const decoded = decodeURIComponent(atob(token.replace(/-/g,'+').replace(/_/g,'/')));
            setData(JSON.parse(decoded));
        } catch(e) { setError('連結無效'); }
        setLoading(false);
    }, [token]);
    if (loading) return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center',color:'var(--text3)'}}>載入中...</div></div>;
    if (error) return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}><div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:16}}>🔒</div><div style={{color:'var(--text)',fontWeight:600}}>{error}</div><button onClick={onClose} style={{marginTop:16,color:'var(--accent)',background:'none',border:'none',fontSize:14,cursor:'pointer'}}>返回</button></div></div>;
    const {investorName,initial_amount,history=[],currentVal,profit,roi,proxyTotal,generatedAt,ownerNote} = data||{};
    const parsedHistory = Array.isArray(history)?history:[];
    const invested = parsedHistory.reduce((s,h)=>h.type==='add'?s+(parseFloat(h.amount)||0):s,parseFloat(initial_amount)||0);
    return (
        <div className="share-page animate-fade">
            <button onClick={onClose} style={{display:'flex',alignItems:'center',gap:6,color:'var(--accent)',background:'none',border:'none',fontSize:15,cursor:'pointer',marginBottom:20}}>
                <Icon name="back" size={18} color="var(--accent)"/> 返回
            </button>
            <div style={{marginBottom:4,display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1}}>代操帳戶</span>
                <span className="tag tag-green">公開檢視</span>
            </div>
            <div style={{fontSize:28,fontWeight:700,color:'var(--text)',letterSpacing:-0.5,marginBottom:4}}>{investorName||'投資帳戶'}</div>
            {ownerNote && <div style={{fontSize:14,color:'var(--text3)',marginBottom:16}}>{ownerNote}</div>}
            <div className="grid-2" style={{marginTop:16}}>
                <div className="stat-card"><div className="stat-label">目前市值</div><div className="stat-value">${Math.round(currentVal||0).toLocaleString()}</div></div>
                <div className="stat-card"><div className="stat-label">損益</div><div className={`stat-value ${(profit||0)>=0?'green':'red'}`}>{(profit||0)>=0?'+':''} ${Math.round(profit||0).toLocaleString()}</div><div style={{fontSize:11,color:(roi||0)>=0?'var(--green)':'var(--red)',fontWeight:600,marginTop:2}}>{(roi||0)>=0?'+':''}{(roi||0).toFixed(2)}%</div></div>
                <div className="stat-card"><div className="stat-label">總投入</div><div className="stat-value">${Math.round(invested).toLocaleString()}</div></div>
                <div className="stat-card"><div className="stat-label">整體資金池</div><div className="stat-value">${Math.round(proxyTotal||0).toLocaleString()}</div></div>
            </div>
            <div className="card-section-title">資金往來明細</div>
            <div className="card">
                {[{id:'init',type:'init',amount:parseFloat(initial_amount)||0},...parsedHistory].sort((a,b)=>(a.ts||0)-(b.ts||0)).map((h,idx)=>{
                    const amt = parseFloat(h.amount)||0;
                    const labels = {init:'初始投入',add:'再投入',settle:'損益結算'};
                    const tagClass = h.type==='init'?'tag-blue':h.type==='add'?'tag-purple':amt>=0?'tag-green':'tag-red';
                    const dateStr = h.ts?new Date(h.ts).toLocaleDateString('zh-TW'):'起始';
                    return <div key={h.id||idx} className="card-row"><div style={{flex:1}}><div style={{display:'flex',gap:8,alignItems:'center',marginBottom:2}}><span className={`tag ${tagClass}`}>{labels[h.type]}</span><span style={{fontSize:12,color:'var(--text3)'}}>{dateStr}</span></div></div><div style={{fontSize:16,fontWeight:700,color:amt>=0?'var(--green)':'var(--red)'}}>{amt>=0?'+':''}${amt.toFixed(2)}</div></div>;
                })}
                <div className="card-row" style={{background:'var(--accent)',borderRadius:0}}>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.8)'}}>目前帳面市值</div></div>
                    <div style={{fontSize:18,fontWeight:700,color:'#fff'}}>${Math.round(currentVal||0).toLocaleString()}</div>
                </div>
            </div>
            <div style={{textAlign:'center',marginTop:24,fontSize:11,color:'var(--text3)'}}>產生時間: {generatedAt?new Date(generatedAt).toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}):'-'}</div>
            <div style={{textAlign:'center',fontSize:11,color:'var(--text3)',marginTop:4}}>Crypto Invest · 代操管理系統</div>
        </div>
    );
}

// ── Main App ────────────────────────────────────
function App() {
    const [user, setUser] = useState(null);
    const [activeTab, setActiveTab] = useState('home');
    const [drawerOpen, setDrawerOpen] = useState(false);
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const [isDark, setIsDark] = useState(() => {
        const saved = localStorage.getItem('ci_theme');
        if (saved === 'dark') return true;
        if (saved === 'light') return false;
        return systemDark;
    });
    useEffect(() => {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        localStorage.setItem('ci_theme', isDark ? 'dark' : 'light');
    }, [isDark]);
    const [records, setRecords] = useState([]);
    const [initCap, setInitCap] = useState(0);
    const [showProfit, setShowProfit] = useState(true);
    const [isChartZoomed, setIsChartZoomed] = useState(true);
    const [currency, setCurrency] = useState('USD');
    const [usdtToTwdRate, setUsdtToTwdRate] = useState(32.0);
    const rateMultiplier = currency==='TWD'?usdtToTwdRate:1;
    const curSymbol = currency==='TWD'?'NT$':'$';
    const [assets, setAssets] = useState([]);
    const [priceMap, setPriceMap] = useState({});
    const [changeMap, setChangeMap] = useState({});
    const [managedFunds, setManagedFunds] = useState([]);
    const [proxyTotal, setProxyTotal] = useState('');
    const [arbForm, setArbForm] = useState({sellPrice:'',sellQty:'',fee:'0.1',buyPrice:''});
    const [arbRecords, setArbRecords] = useState([]);
    const [selectedInvestorId, setSelectedInvestorId] = useState(null);
    const [addFundId, setAddFundId] = useState(null);
    const [addFundAmount, setAddFundAmount] = useState('');
    const [shareModalOpen, setShareModalOpen] = useState(false);
    const [shareUrl, setShareUrl] = useState('');
    const [shareCopied, setShareCopied] = useState(false);
    const [shareLoading, setShareLoading] = useState(false);
    const [publicViewToken, setPublicViewToken] = useState(null);
    const [authForm, setAuthForm] = useState({email:'',password:''});
    const [mainForm, setMainForm] = useState({amount:'',deposit:'',withdrawal:'',note:'',date:getTaiwanDateTime()});
    const [editingId, setEditingId] = useState(null);
    const [editForm, setEditForm] = useState({});
    const [syncWithdrawal, setSyncWithdrawal] = useState('');
    const [assetSortMode, setAssetSortMode] = useState('default');
    const [calendarDate, setCalendarDate] = useState(new Date());
    const [filterRange, setFilterRange] = useState(()=>{
        const now=new Date(), y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0');
        const last=new Date(y,now.getMonth()+1,0).getDate();
        return {start:`${y}-${m}-01`,end:`${y}-${m}-${last}`};
    });
    const [activeTag, setActiveTag] = useState(null);
    const [timelineCollapsed, setTimelineCollapsed] = useState(false);
    const debounceRef = useRef({});

    // fetch TWD rate
    useEffect(() => {
        const fetchRate = async () => {
            try {
                const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://max-api.maicoin.com/api/v2/tickers/usdttwd')}`);
                const d = await r.json();
                if(d&&d.last) setUsdtToTwdRate(parseFloat(d.last));
            } catch(e){}
        };
        fetchRate();
        const t = setInterval(fetchRate, 10000);
        return ()=>clearInterval(t);
    },[]);

    // fetch prices
    useEffect(()=>{
        const fetchPrices = async () => {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const d = await r.json();
                const pm={}, cm={};
                d.forEach(i=>{if(i.symbol.endsWith('USDT')){const s=i.symbol.replace('USDT','');pm[s]=parseFloat(i.lastPrice);cm[s]=parseFloat(i.priceChangePercent);}});
                setPriceMap(pm); setChangeMap(cm);
            } catch(e){}
        };
        fetchPrices();
        const t = setInterval(fetchPrices,5000);
        return ()=>clearInterval(t);
    },[]);

    // auth
    useEffect(()=>{
        const params = new URLSearchParams(window.location.search);
        const token = params.get('share');
        if(token) setPublicViewToken(token);
        supabase.auth.getSession().then(({data:{session}})=>{
            setUser(session?.user??null);
            if(session?.user) loadAll(session.user.id);
        });
        const {data:{subscription}} = supabase.auth.onAuthStateChange((_,session)=>{
            setUser(session?.user??null);
            if(session?.user) loadAll(session.user.id);
        });
        return ()=>subscription.unsubscribe();
    },[]);

    const loadAll = async (uid) => {
        // settings
        const {data:s} = await supabase.from('user_settings').select('invest_init').eq('user_id',uid).single();
        if(s) setInitCap(s.invest_init||0);
        // records
        const {data:r} = await supabase.from('records').select('*').order('date',{ascending:true});
        if(r) setRecords(r);
        // assets
        const {data:a} = await supabase.from('assets').select('*').order('created_at',{ascending:true});
        if(a) setAssets(a.length?a:[]);
        // prefs
        const {data:p} = await supabase.from('user_preferences').select('*').eq('user_id',uid).single();
        if(p) { setProxyTotal(p.proxy_current_total||''); setArbForm({sellPrice:p.arb_sell_price||'',sellQty:p.arb_sell_qty||'',fee:p.arb_fee||'0.1',buyPrice:p.arb_buy_price||''}); }
        // managed funds
        const {data:mf} = await supabase.from('managed_funds').select('*').order('created_at',{ascending:true});
        if(mf) setManagedFunds(mf);
        // arb records
        const {data:ar} = await supabase.from('arb_records').select('*').order('date',{ascending:false});
        if(ar) setArbRecords(ar);
    };

    const fetchData = async () => {
        const {data} = await supabase.from('records').select('*').order('date',{ascending:true});
        if(data) setRecords(data);
    };

    // debounced save
    const debouncedSave = (key, fn, delay=600) => {
        if(debounceRef.current[key]) clearTimeout(debounceRef.current[key]);
        debounceRef.current[key] = setTimeout(fn, delay);
    };

    const syncInitCap = async (val) => {
        const n = parseFloat(val)||0; setInitCap(n);
        if(user) await supabase.from('user_settings').upsert({user_id:user.id,invest_init:n,updated_at:new Date().toISOString()});
    };

    const handleAuth = async (e) => {
        e.preventDefault();
        const {error:signInErr} = await supabase.auth.signInWithPassword({email:authForm.email,password:authForm.password});
        if(signInErr) {
            const {error:signUpErr} = await supabase.auth.signUp({email:authForm.email,password:authForm.password});
            if(signUpErr) alert('驗證失敗: '+signUpErr.message);
            else alert('註冊成功，請嘗試登入');
        }
    };

    // records
    const allData = useMemo(()=>{
        let cf=0;
        return records.map((r,i)=>{
            const dep=parseFloat(r.deposit)||0, wth=parseFloat(r.withdrawal)||0, amt=parseFloat(r.amount)||0;
            cf+=(dep-wth);
            const prev=records[i-1], prevAmt=prev?(parseFloat(prev.amount)||0):0;
            const profit=prev?(amt-prevAmt-dep+wth):0;
            const roi=(prev&&prevAmt!==0)?(profit/prevAmt)*100:0;
            const dateObj=new Date(r.date);
            let apy=0;
            if(prev){const pd=new Date(prev.date);let dd=Math.max((dateObj-pd)/(86400000),0.1);const rd=roi/100;if(rd>-1)apy=(Math.pow(1+rd,365/dd)-1)*100;}
            return {...r,ts:dateObj.getTime(),displayDate:`${dateObj.getMonth()+1}/${dateObj.getDate()}`,displayDateTime:dateObj.toLocaleString([],{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),'實際':amt,'還原':amt-cf,p:parseFloat(profit.toFixed(2))||0,r:roi,apy,withdrawal:wth};
        });
    },[records]);

    const allTimeTotalWith = useMemo(()=>allData.reduce((s,r)=>s+(parseFloat(r.withdrawal)||0),0),[allData]);

    const dailyProfits = useMemo(()=>{
        const map={};
        const wmap={};
        allData.forEach(r=>{
            const d=new Date(r.date), key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            map[key]=(map[key]||0)+r.p;
            if(r.withdrawal>0) wmap[key]=(wmap[key]||0)+r.withdrawal;
        });
        return {profits:map, withdrawals:wmap};
    },[allData]);

    const dailyProfitMap = dailyProfits.profits;
    const dailyWithdrawMap = dailyProfits.withdrawals;

    const homeStats = useMemo(()=>{
        const last=allData[allData.length-1];
        const currentAsset=last?(parseFloat(last.amount)||0):0;
        const now=new Date(), monthStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
        const monthProfit=allData.filter(r=>r.ts>=monthStart).reduce((s,r)=>s+(r.p||0),0);
        let overallAPY=0;
        if(allData.length>=2){
            const first=allData[0], daysDiff=Math.max((last.ts-first.ts)/86400000,1);
            const totalP=allData.reduce((s,r)=>s+(r.p||0),0), rd=initCap>0?totalP/initCap:0;
            if(rd>-1) overallAPY=(Math.pow(1+rd,365/daysDiff)-1)*100;
        }
        return {currentAsset,monthProfit,overallAPY};
    },[allData,initCap]);

    const miniChart7Days = useMemo(()=>{
        const now=new Date(), result=[];
        for(let i=6;i>=0;i--){
            const d=new Date(now); d.setDate(d.getDate()-i);
            const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            result.push({key,label:i===0?'今日':`${d.getMonth()+1}/${d.getDate()}`,profit:dailyProfitMap[key]??null,isToday:i===0});
        }
        const maxAbs=Math.max(...result.map(d=>d.profit!==null?Math.abs(d.profit):0),1);
        return result.map(d=>({...d,barH:d.profit!==null?Math.max(Math.round((Math.abs(d.profit)/maxAbs)*52),8):0}));
    },[dailyProfits]);

    const handleAdd = async (e) => {
        e.preventDefault();
        const {error} = await supabase.from('records').insert([{user_id:user.id,date:new Date(mainForm.date).toISOString(),amount:parseFloat(mainForm.amount),deposit:parseFloat(mainForm.deposit||0),withdrawal:parseFloat(mainForm.withdrawal||0),note:mainForm.note}]);
        if(!error){setMainForm({...mainForm,amount:'',deposit:'',withdrawal:'',note:'',date:getTaiwanDateTime()});fetchData();}
    };
    const handleUpdate = async (id) => {
        const {error} = await supabase.from('records').update({amount:parseFloat(editForm.amount),deposit:parseFloat(editForm.deposit||0),withdrawal:parseFloat(editForm.withdrawal||0),date:new Date(editForm.date).toISOString(),note:editForm.note}).eq('id',id);
        if(!error){setEditingId(null);fetchData();}
    };

    // assets
    const totalAssets = useMemo(()=>assets.reduce((s,a)=>{
        const q=parseFloat(a.quantity)||0;
        return s+(a.coin==='USDT'?q:q*(priceMap[a.coin]||0));
    },0),[assets,priceMap]);

    const assetsWithValue = useMemo(()=>assets.map(a=>{
        const q=parseFloat(a.quantity)||0, v=a.coin==='USDT'?q:q*(priceMap[a.coin]||0);
        return {...a,value:v,ratio:totalAssets>0?v/totalAssets:0};
    }),[assets,priceMap,totalAssets]);

    const sortedAssets = useMemo(()=>assetSortMode==='value'?[...assetsWithValue].sort((a,b)=>b.value-a.value):assetsWithValue,[assetsWithValue,assetSortMode]);

    const updateAsset = (id,field,value) => {
        const na=assets.map(a=>a.id===id?{...a,[field]:value}:a); setAssets(na);
        debouncedSave(`asset-${id}`,async()=>{
            const item=na.find(a=>a.id===id);
            if(item) await supabase.from('assets').upsert({id:item.id,user_id:user.id,coin:item.coin,name:item.name,quantity:item.quantity});
        });
    };
    const addAssetRow = async () => {
        const n={id:Date.now(),user_id:user.id,coin:'USDT',name:'',quantity:0};
        setAssets([...assets,n]); await supabase.from('assets').insert([n]);
    };
    const removeAssetRow = async (id) => {
        setAssets(assets.filter(a=>a.id!==id)); await supabase.from('assets').delete().eq('id',id);
    };
    const handleSyncToLedger = async () => {
        if(totalAssets<=0) return alert('總金額為 0，請先輸入資產');
        if(!confirm('確定要將總金額寫入帳本？')) return;
        const w=parseFloat(syncWithdrawal)||0;
        const {error}=await supabase.from('records').insert([{user_id:user.id,date:new Date().toISOString(),amount:parseFloat(totalAssets),deposit:0,withdrawal:w,note:'來自資產配置同步'}]);
        if(!error){alert('✅ 已成功寫入帳本！');setSyncWithdrawal('');fetchData();setActiveTab('home');}
        else alert('寫入失敗: '+error.message);
    };
    const vsLastRecord = useMemo(()=>{
        if(!allData||allData.length===0) return null;
        const last=allData[allData.length-1], lastAmt=parseFloat(last.amount)||0;
        if(lastAmt===0) return null;
        const diff=totalAssets-lastAmt;
        return {diff,diffPct:(diff/lastAmt)*100,lastAmt,lastDate:last.displayDateTime};
    },[allData,totalAssets]);

    // distribution
    const distributionStats = useMemo(()=>{
        const totalCurrent=parseFloat(proxyTotal)||0;
        let totalBase=0, totalInvested=0;
        const listWithBase=managedFunds.map(m=>{
            const init=parseFloat(m.initial_amount)||0;
            const hist=Array.isArray(m.history)?m.history:(typeof m.history==='string'?JSON.parse(m.history||'[]'):[]);
            let base=init, invested=init;
            hist.forEach(h=>{base+=parseFloat(h.amount)||0;if(h.type==='add')invested+=parseFloat(h.amount)||0;});
            totalBase+=base; totalInvested+=invested;
            return {...m,parsedHistory:hist,base,invested};
        });
        const totalProfit=totalCurrent-totalInvested, totalROI=totalInvested>0?(totalProfit/totalInvested)*100:0;
        const list=listWithBase.map(m=>{
            const ratio=totalBase>0?m.base/totalBase:0, cv=ratio*totalCurrent, p=cv-m.invested, r=m.invested>0?(p/m.invested)*100:0;
            return {...m,ratio,currentVal:cv,p,r};
        });
        return {totalBase,totalInvested,totalProfit,totalROI,list};
    },[managedFunds,proxyTotal]);

    const updateManagedFund = (id,field,value) => {
        const nl=managedFunds.map(m=>m.id===id?{...m,[field]:value}:m); setManagedFunds(nl);
        debouncedSave(`fund-${id}`,async()=>{
            const item=nl.find(m=>m.id===id);
            if(item&&user) await supabase.from('managed_funds').upsert({id:item.id,user_id:user.id,name:item.name,initial_amount:item.initial_amount});
        });
    };
    const addInvestor = async () => {
        const n={id:Date.now(),user_id:user.id,name:'',initial_amount:'',history:[]};
        setManagedFunds([...managedFunds,n]); await supabase.from('managed_funds').insert([n]);
    };
    const removeInvestor = async (id) => {
        setManagedFunds(managedFunds.filter(m=>m.id!==id)); await supabase.from('managed_funds').delete().eq('id',id);
        if(selectedInvestorId===id) setSelectedInvestorId(null);
    };
    const updateProxyTotal = (val) => {
        setProxyTotal(val);
        debouncedSave('proxy',async()=>{ if(user) await supabase.from('user_preferences').upsert({user_id:user.id,proxy_current_total:parseFloat(val)||null,arb_sell_price:parseFloat(arbForm.sellPrice)||null,arb_sell_qty:parseFloat(arbForm.sellQty)||null,arb_fee:parseFloat(arbForm.fee)||null,arb_buy_price:parseFloat(arbForm.buyPrice)||null,updated_at:new Date().toISOString()}); });
    };
    const updateArbForm = (field,value) => {
        const nf={...arbForm,[field]:value}; setArbForm(nf);
        debouncedSave('arb',async()=>{ if(user) await supabase.from('user_preferences').upsert({user_id:user.id,arb_sell_price:parseFloat(nf.sellPrice)||null,arb_sell_qty:parseFloat(nf.sellQty)||null,arb_fee:parseFloat(nf.fee)||null,arb_buy_price:parseFloat(nf.buyPrice)||null,proxy_current_total:parseFloat(proxyTotal)||null,updated_at:new Date().toISOString()}); });
    };

    const submitAddFund = async (fundId) => {
        const amt=parseFloat(addFundAmount);
        if(!amt||amt<=0) return alert('請輸入有效金額');
        const fi=managedFunds.findIndex(f=>f.id===fundId); if(fi<0) return;
        const nf=[...managedFunds];
        const hr={id:Date.now(),ts:Date.now(),type:'add',amount:amt};
        const ch=Array.isArray(nf[fi].history)?nf[fi].history:(typeof nf[fi].history==='string'?JSON.parse(nf[fi].history||'[]'):[]);
        nf[fi].history=[...ch,hr];
        const nt=(parseFloat(proxyTotal)||0)+amt;
        await supabase.from('managed_funds').upsert({id:nf[fi].id,user_id:user.id,name:nf[fi].name,initial_amount:nf[fi].initial_amount,history:nf[fi].history});
        await supabase.from('user_preferences').upsert({user_id:user.id,proxy_current_total:nt,arb_sell_price:parseFloat(arbForm.sellPrice)||null,arb_sell_qty:parseFloat(arbForm.sellQty)||null,arb_fee:parseFloat(arbForm.fee)||null,arb_buy_price:parseFloat(arbForm.buyPrice)||null,updated_at:new Date().toISOString()});
        setManagedFunds(nf); setProxyTotal(nt.toString()); setAddFundId(null); setAddFundAmount('');
        alert(`✅ 成功再投入 ${amt} USD！`);
    };

                    const ch=Array.isArray(nf[fi].history)?nf[fi].history:(typeof nf[fi].history==='string'?JSON.parse(nf[fi].history||'[]'):[]);

                                    {/* total */}
                                    <div className="hero-card" style={{marginBottom:12}}>
                                        <div className="hero-label">代操總市值</div>
                                        <div style={{display:'flex',alignItems:'baseline',gap:8,marginTop:4,marginBottom:12}}>
                                            <input type="number" placeholder="輸入總金額" value={proxyTotal} onChange={e=>updateProxyTotal(e.target.value)} style={{background:'transparent',border:'none',fontSize:36,fontWeight:700,color:'var(--text)',outline:'none',width:'100%',letterSpacing:-1}}/>
                                            <span style={{fontSize:15,color:'var(--text3)',flexShrink:0}}>USD</span>
                                        </div>
                                        <div style={{display:'flex',gap:16}}>
                                            <div><div style={{fontSize:11,color:'var(--text3)'}}>總投入</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>${Math.round(distributionStats.totalInvested*rateMultiplier).toLocaleString()}</div></div>
                                            <div style={{width:'0.5px',background:'var(--sep)'}}/>
                                            <div><div style={{fontSize:11,color:'var(--text3)'}}>損益</div><div style={{fontSize:15,fontWeight:700,color:distributionStats.totalProfit>=0?'var(--green)':'var(--red)'}}>{distributionStats.totalProfit>=0?'+':''}{curSymbol}{Math.round(distributionStats.totalProfit*rateMultiplier).toLocaleString()}</div></div>
                                            <div style={{width:'0.5px',background:'var(--sep)'}}/>
                                            <div><div style={{fontSize:11,color:'var(--text3)'}}>投資人</div><div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{distributionStats.list.length} 人</div></div>
                                            <div style={{marginLeft:'auto'}}>
                                                <button onClick={handleSettleProfits} style={{background:'rgba(175,82,222,0.12)',color:'var(--purple)',border:'none',borderRadius:20,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}>結算</button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* investor tabs */}
                                    <div className="inv-tabs" style={{marginBottom:0,background:'var(--card)',borderRadius:'var(--radius-lg) var(--radius-lg) 0 0',marginBottom:0}}>
                                        {distributionStats.list.map((m,idx)=>(
                                            <button key={m.id} className={`inv-tab ${(selectedInvestorId===m.id||(!selectedInvestorId&&idx===0))?'active':''}`} onClick={()=>setSelectedInvestorId(m.id)}>
                                                <span style={{display:'flex',alignItems:'center',gap:6}}>
                                                    <span style={{width:8,height:8,borderRadius:'50%',background:PIE_COLORS[idx%PIE_COLORS.length],display:'inline-block'}}/>
                                                    {m.name||`投資人 ${idx+1}`}
                                                </span>
                                            </button>
                                        ))}
                                    </div>

                                    {/* selected investor */}
                                    {effectiveInvestor&&(
                                        <div className="card animate-up" style={{borderRadius:'0 0 var(--radius-lg) var(--radius-lg)',marginBottom:12}}>
                                            <div style={{padding:16}}>
                                                {/* name & initial */}
                                                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
                                                    <div>
                                                        <input type="text" placeholder="姓名" value={effectiveInvestor.name} onChange={e=>updateManagedFund(effectiveInvestor.id,'name',e.target.value)} style={{background:'transparent',border:'none',fontSize:20,fontWeight:700,color:'var(--text)',outline:'none',marginBottom:4,display:'block'}}/>
                                                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                                                            <span style={{fontSize:12,color:'var(--text3)'}}>初始投入</span>
                                                            <input type="number" placeholder="0" value={effectiveInvestor.initial_amount} onChange={e=>updateManagedFund(effectiveInvestor.id,'initial_amount',e.target.value)} style={{background:'transparent',border:'none',borderBottom:'0.5px solid var(--sep)',color:'var(--text)',fontSize:14,fontWeight:600,width:80,outline:'none'}}/>
                                                            <span style={{fontSize:12,color:'var(--text3)'}}>USD</span>
                                                        </div>
                                                    </div>
                                                    <div style={{display:'flex',gap:8}}>
                                                        <button onClick={()=>handleGenerateShare(effectiveInvestor.id)} style={{background:'rgba(0,122,255,0.1)',color:'var(--accent)',border:'none',borderRadius:20,padding:'8px 12px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                                                            <Icon name="share" size={14} color="var(--accent)"/> 分享
                                                        </button>
                                                        <button onClick={()=>removeInvestor(effectiveInvestor.id)} style={{background:'rgba(255,59,48,0.1)',color:'#ff453a',border:'none',borderRadius:20,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                                                            刪除
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* stats */}
                                                <div className="grid-3" style={{margin:0}}>
                                                    <div className="stat-card"><div className="stat-label">市值</div><div className="stat-value" style={{fontSize:16}}>{curSymbol}{Math.round(effectiveInvestor.currentVal*rateMultiplier).toLocaleString()}</div></div>
                                                    <div className="stat-card" style={{background:effectiveInvestor.p>=0?'rgba(52,199,89,0.08)':'rgba(255,59,48,0.08)'}}><div className="stat-label">損益</div><div className={`stat-value ${effectiveInvestor.p>=0?'green':'red'}`} style={{fontSize:16}}>{effectiveInvestor.p>=0?'+':''}{curSymbol}{Math.round(effectiveInvestor.p*rateMultiplier).toLocaleString()}</div><div style={{fontSize:11,color:effectiveInvestor.r>=0?'var(--green)':'var(--red)',fontWeight:600}}>{effectiveInvestor.r.toFixed(2)}%</div></div>
                                                    <div className="stat-card"><div className="stat-label">佔比</div><div className="stat-value" style={{fontSize:16}}>{(effectiveInvestor.ratio*100).toFixed(1)}%</div></div>
                                                </div>
                                            </div>

                                            {/* timeline */}
                                            <div style={{borderTop:'0.5px solid var(--sep)',padding:'14px 16px'}}>
                                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                                                    <button onClick={()=>setTimelineCollapsed(!timelineCollapsed)} style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer'}}>
                                                        <span style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>資金往來</span>
                                                        <span style={{fontSize:11,background:'var(--card2)',padding:'2px 8px',borderRadius:10,color:'var(--text3)',fontWeight:600}}>{effectiveInvestor.parsedHistory.length+1} 筆</span>
                                                        <Icon name={timelineCollapsed?'down':'up'} size={14} color="var(--text3)"/>
                                                    </button>
                                                    <button onClick={()=>{setAddFundId(addFundId===effectiveInvestor.id?null:effectiveInvestor.id);setAddFundAmount('');}} style={{background:'rgba(0,122,255,0.1)',color:'var(--accent)',border:'none',borderRadius:20,padding:'6px 12px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                                                        + 再投入
                                                    </button>
                                                </div>
                                                {addFundId===effectiveInvestor.id&&(
                                                    <div style={{display:'flex',gap:8,marginBottom:12,background:'rgba(0,122,255,0.06)',borderRadius:12,padding:10}}>
                                                        <input type="number" value={addFundAmount} onChange={e=>setAddFundAmount(e.target.value)} placeholder="加碼金額 (USD)" className="ios-input" style={{flex:1}} autoFocus/>
                                                        <button onClick={()=>submitAddFund(effectiveInvestor.id)} className="btn-primary" style={{width:'auto',padding:'0 16px',whiteSpace:'nowrap'}}>確認</button>
                                                    </div>
                                                )}
                                                {!timelineCollapsed&&(
                                                    <div>
                                                        {/* init */}
                                                        <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'0.5px solid var(--sep)'}}>
                                                            <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(0,122,255,0.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                                                <span style={{fontSize:14,color:'var(--accent)'}}>₀</span>
                                                            </div>
                                                            <div style={{flex:1}}><span className="tag tag-blue">初始投入</span></div>
                                                            <span style={{fontSize:16,fontWeight:700,color:'var(--accent)'}}>+${parseFloat(effectiveInvestor.initial_amount||0).toFixed(2)}</span>
                                                        </div>
                                                        {[...effectiveInvestor.parsedHistory].sort((a,b)=>(a.ts||0)-(b.ts||0)).map((h,hi)=>{
                                                            const amt=parseFloat(h.amount)||0, isAdd=h.type==='add';
                                                            const dateStr=h.ts?new Date(h.ts).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'}):'';
                                                            return (
                                                                <div key={h.id||hi} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'0.5px solid var(--sep)'}}>
                                                                    <div style={{width:32,height:32,borderRadius:'50%',background:isAdd?'rgba(88,86,214,0.12)':amt>=0?'rgba(52,199,89,0.12)':'rgba(255,59,48,0.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                                                        <span style={{fontSize:14,color:isAdd?'var(--purple)':amt>=0?'var(--green)':'var(--red)'}}>{isAdd?'+':'≈'}</span>
                                                                    </div>
                                                                    <div style={{flex:1}}>
                                                                        <span className={`tag ${isAdd?'tag-purple':amt>=0?'tag-green':'tag-red'}`}>{isAdd?'再投入':'損益結算'}</span>
                                                                        <span style={{fontSize:11,color:'var(--text3)',marginLeft:6}}>{dateStr}</span>
                                                                    </div>
                                                                    <span style={{fontSize:16,fontWeight:700,color:amt>=0?'var(--green)':'var(--red)'}}>{amt>=0?'+':''}${amt.toFixed(2)}</span>
                                                                    <button onClick={()=>deleteFundHistory(effectiveInvestor.id,h)} style={{background:'none',border:'none',cursor:'pointer',padding:4}}>
                                                                        <Icon name="x" size={14} color="var(--text3)"/>
                                                                    </button>
                                                                </div>
                                                            );
                                                        })}
                                                        {/* current */}
                                                        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',background:'var(--accent)',margin:'8px -16px -14px',padding:'12px 16px',borderRadius:'0 0 var(--radius-lg) var(--radius-lg)'}}>
                                                            <div style={{flex:1,fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.8)'}}>目前帳面市值</div>
                                                            <span style={{fontSize:20,fontWeight:700,color:'#fff'}}>{curSymbol}{Math.round(effectiveInvestor.currentVal*rateMultiplier).toLocaleString()}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* Pie chart */}
                                    {distributionStats.list.length>1&&(
                                        <div className="card" style={{marginBottom:12}}>
                                            <div style={{padding:'14px 16px 0'}}>
                                                <span style={{fontSize:13,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.5}}>投資人佔比</span>
                                            </div>
                                            <div style={{height:260}}>
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie
                                                            data={distributionStats.list}
                                                            dataKey="base"
                                                            nameKey="name"
                                                            cx="50%" cy="48%"
                                                            innerRadius={40}
                                                            outerRadius={70}
                                                            paddingAngle={3}
                                                            label={({name,percent})=>`${name||'?'} ${(percent*100).toFixed(0)}%`}
                                                            labelLine={{stroke:'#8e8e93',strokeWidth:1}}
                                                        >
                                                            {distributionStats.list.map((e,i)=><Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}
                                                        </Pie>
                                                        <Tooltip contentStyle={{background:'var(--card)',border:'0.5px solid var(--sep)',borderRadius:12,fontSize:12}} formatter={(v,n)=>[`$${Math.round(v).toLocaleString()}`,n]}/>
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                            <div style={{display:'flex',flexWrap:'wrap',gap:8,padding:'0 16px 14px'}}>
                                                {distributionStats.list.map((m,i)=>(
                                                    <div key={m.id} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--text2)'}}>
                                                        <div style={{width:8,height:8,borderRadius:'50%',background:PIE_COLORS[i%PIE_COLORS.length],flexShrink:0}}/>
                                                        <span>{m.name||`投資人${i+1}`}</span>
                                                        <span style={{color:'var(--text3)'}}>{distributionStats.totalBase>0?((m.base/distributionStats.totalBase)*100).toFixed(1):0}%</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {!effectiveInvestor&&(
                                        <div style={{textAlign:'center',padding:'60px 20px'}}>
                                            <div style={{fontSize:48,marginBottom:12}}>👥</div>
                                            <div style={{fontSize:15,color:'var(--text3)',marginBottom:20}}>尚未新增任何投資人</div>
                                            <button className="btn-primary" style={{width:'auto',padding:'12px 32px',borderRadius:20}} onClick={addInvestor}>+ 新增第一位投資人</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                })()}

                {/* ══ ARBITRAGE ══ */}
                {activeTab==='arbitrage'&&(
                    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                        <div className="ios-nav">
                            <div className="ios-nav-row">
                                <button className="ios-nav-btn" onClick={()=>setIsDark(d=>!d)} title={isDark?'切換亮色':'切換暗色'} style={{fontSize:16,background:'var(--card2)',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{isDark ? '☀️' : '🌙'}</button>
                                <div className="ios-nav-large">USDT 套利</div>
                                <div/>
                            </div>
                        </div>
                        <div className="page">
                            <div className="page-content">
                                <div style={{height:12}}/>
                                {/* fee */}
                                <div className="card" style={{marginBottom:12}}>
                                    <div className="card-row">
                                        <div className="list-body"><div className="list-title">交易手續費率</div></div>
                                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                                            <input type="number" value={arbForm.fee} onChange={e=>updateArbForm('fee',e.target.value)} style={{background:'var(--card2)',border:'none',borderRadius:8,padding:'6px 10px',fontSize:16,fontWeight:700,color:'var(--text)',width:64,outline:'none',textAlign:'center'}}/>
                                            <span style={{fontSize:14,color:'var(--text3)',fontWeight:600}}>%</span>
                                        </div>
                                    </div>
                                </div>

                                {/* step1 */}
                                <div className="card" style={{marginBottom:12}}>
                                    <div style={{padding:'14px 16px 0',display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                        <div style={{width:28,height:28,borderRadius:'50%',background:'var(--red)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>1</div>
                                        <span style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>高點賣出 USDT→TWD</span>
                                    </div>
                                    <div style={{padding:'0 16px 14px',display:'flex',flexDirection:'column',gap:10}}>
                                        <div style={{display:'flex',gap:10}}>
                                            <div style={{flex:1}}><div className="input-label">賣出匯率</div><input type="number" placeholder="32.5" value={arbForm.sellPrice} onChange={e=>updateArbForm('sellPrice',e.target.value)} className="ios-input" style={{fontSize:20,fontWeight:700}}/></div>
                                            <div style={{flex:1}}><div className="input-label">賣出數量 USDT</div><input type="number" placeholder="1000" value={arbForm.sellQty} onChange={e=>updateArbForm('sellQty',e.target.value)} className="ios-input" style={{fontSize:20,fontWeight:700}}/></div>
                                        </div>
                                        {arbStats&&<div style={{background:'rgba(255,149,0,0.08)',borderRadius:12,padding:'10px 12px',fontSize:13,color:'var(--orange)',fontWeight:600}}>損益平衡買回上限: {arbStats.breakEvenP.toFixed(4)}</div>}
                                        {arbStats&&(
                                            <div style={{background:'var(--card2)',borderRadius:12,padding:'10px 12px'}}>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--text3)',marginBottom:4}}><span>總額</span><span>{Math.round(arbStats.step1.grossTWD).toLocaleString()} TWD</span></div>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--red)',marginBottom:4}}><span>手續費</span><span>-{Math.round(arbStats.step1.feeSell).toLocaleString()}</span></div>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700,color:'var(--green)',borderTop:'0.5px solid var(--sep)',paddingTop:4}}><span>實際入袋</span><span>{Math.round(arbStats.step1.netTWD).toLocaleString()} TWD</span></div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* step2 */}
                                <div className="card" style={{marginBottom:12}}>
                                    <div style={{padding:'14px 16px 0',display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                        <div style={{width:28,height:28,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>2</div>
                                        <span style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>低點買回 TWD→USDT</span>
                                    </div>
                                    <div style={{padding:'0 16px 14px'}}>
                                        <div className="input-label">買回匯率</div>
                                        <input type="number" placeholder="32.1" value={arbForm.buyPrice} onChange={e=>updateArbForm('buyPrice',e.target.value)} className="ios-input" style={{fontSize:20,fontWeight:700,marginBottom:10}}/>
                                        {arbStats?.step2&&(
                                            <div style={{background:'var(--card2)',borderRadius:12,padding:'10px 12px'}}>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--text3)',marginBottom:4}}><span>買入(前)</span><span>{arbStats.step2.grossBuyUSDT.toFixed(2)} U</span></div>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--red)',marginBottom:4}}><span>手續費</span><span>-{arbStats.step2.feeBuyUSDT.toFixed(2)} U</span></div>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700,color:'var(--green)',borderTop:'0.5px solid var(--sep)',paddingTop:4}}><span>實際買回</span><span>{arbStats.step2.netBuyUSDT.toFixed(2)} U</span></div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* result */}
                                {arbStats?.summary?(
                                    <div>
                                        <div className="arb-result">
                                            <div style={{textAlign:'center',fontSize:12,fontWeight:600,opacity:0.7,textTransform:'uppercase',letterSpacing:1,marginBottom:16}}>套利結果</div>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                                                <div style={{textAlign:'center'}}><div style={{fontSize:11,opacity:0.7}}>初始</div><div style={{fontSize:18,fontWeight:700}}>{parseFloat(arbForm.sellQty).toLocaleString()} U</div></div>
                                                <div style={{fontSize:20,opacity:0.5}}>→</div>
                                                <div style={{textAlign:'center'}}><div style={{fontSize:11,opacity:0.7}}>最終</div><div style={{fontSize:18,fontWeight:700}}>{arbStats.step2.netBuyUSDT.toFixed(2)} U</div></div>
                                            </div>
                                            <div style={{background:'rgba(255,255,255,0.15)',borderRadius:12,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                                <div><div style={{fontSize:11,opacity:0.7}}>淨賺</div><div style={{fontSize:24,fontWeight:800}}>+{arbStats.summary.profitUSDT.toFixed(2)} U</div></div>
                                                <div style={{textAlign:'right'}}><div style={{fontSize:11,opacity:0.7}}>報酬率</div><div style={{fontSize:20,fontWeight:700}}>+{arbStats.summary.roi.toFixed(2)}%</div></div>
                                            </div>
                                        </div>
                                        <button className="btn-primary" onClick={()=>saveArbRecord(arbStats.summary)} style={{marginBottom:16}}>儲存此試算結果</button>
                                    </div>
                                ):(
                                    <div style={{textAlign:'center',padding:'24px 0',color:'var(--text3)',fontSize:14}}>請輸入賣出價、數量、買回價以查看結果</div>
                                )}

                                {/* history */}
                                {arbRecords.length>0&&(
                                    <div>
                                        <div className="card-section-title">歷史套利紀錄</div>
                                        <div className="card">
                                            {arbRecords.map(r=>(
                                                <div key={r.id} className="card-row">
                                                    <div className="list-body">
                                                        <div className="list-title">投入 {r.sell_qty} U</div>
                                                        <div className="list-sub">{new Date(r.date).toLocaleString('zh-TW',{timeZone:'Asia/Taipei',hour12:false})}</div>
                                                    </div>
                                                    <div className="list-right">
                                                        <div className="list-value green">+{parseFloat(r.profit_usdt).toFixed(2)} U</div>
                                                        <div style={{fontSize:12,color:'var(--green)',fontWeight:600}}>{parseFloat(r.roi).toFixed(2)}%</div>
                                                    </div>
                                                    <button onClick={()=>deleteArbRecord(r.id)} style={{background:'none',border:'none',cursor:'pointer',marginLeft:8,padding:4}}>
                                                        <Icon name="trash" size={16} color="var(--text3)"/>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div style={{height:16}}/>
                            </div>
                        </div>
                    </div>
                )}
            </div>

            {/* ── Bottom Tab Bar ── */}
            <div className="tab-bar">
                {[['home','帳本','home'],['assets','資產','coin'],['analysis','分析','chart'],['distribution','分配','users'],['arbitrage','套利','arb']].map(([tab,label,icon])=>(
                    <button key={tab} className={`tab-item ${activeTab===tab?'active':''}`} onClick={()=>setActiveTab(tab)}>
                        <div className="tab-icon"><Icon name={icon} size={24} color={activeTab===tab?'var(--accent)':'var(--text3)'}/></div>
                        <span className="tab-label">{label}</span>
                    </button>
                ))}
            </div>
        </div>
    );
}

// helper for inline style var
const var_radius_md = 'var(--radius-md)';

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
